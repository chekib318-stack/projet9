plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "tn.gov.education.examguard"
    compileSdk 35
    ndkVersion "25.1.8937393"
    compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
    kotlinOptions { jvmTarget = "17" }
    defaultConfig {
        applicationId "tn.gov.education.examguard"
        minSdk 21
        targetSdk 35
        versionCode flutter.versionCode
        versionName flutter.versionName
    }
    signingConfigs {
        release {
            keyAlias      System.getenv("CM_KEY_ALIAS")      ?: keystoreProperties["keyAlias"]
            keyPassword   System.getenv("CM_KEY_PASSWORD")   ?: keystoreProperties["keyPassword"]
            def sp = System.getenv("CM_KEYSTORE_PATH") ?: keystoreProperties["storeFile"]
            storeFile     sp ? file(sp) : null
            storePassword System.getenv("CM_KEYSTORE_PASSWORD") ?: keystoreProperties["storePassword"]
        }
    }
    buildTypes {
        debug   { applicationIdSuffix ".debug"; debuggable true }
        release { signingConfig signingConfigs.release; minifyEnabled true; shrinkResources true
                  proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro" }
    }
}
flutter { source "../.." }
